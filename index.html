<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@400;500;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>DevClub - Convert Money</title>
</head>
<body>
    <img  class="logo" src="./assets/img/logo.gif" alt="logo-devclub-convert-money">

    <main>
        <label for="">
            converter <b>de</b>
            <select name="" id="">
                <option value="">R$ Real Brasileiro</option>
            </select>
        </label>

        <label for="">
            converter <b>para</b>
            <select name="" id="">
                <option value="">U$$ Dolar Americano</option>
                <option value="">€ Euro</option>  
            </select>
        </label>

        <label for="">
            valor
            <input type="text" placeholder="Digite o valor a ser convertido">
        </label>

        <button type="submit">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/img/real.png" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value">R$ 0,00</p>
            </div>
                <img  class="arrow-img" src="./assets/img/seta.png" alt="seta-de-conversao">
            <div class="currency-box">
                <img  src="./assets/img/dollar.png" alt="logo-moeda-a-convertida">
                <p class="currency">Dólar</p>
                <p class="currency-value">U$$ 0,00</p>
            </div>
        </section>
    </main>
    <div class="background"><video src="./assets/Video/Pirate_chest_with_treasures_202605270931.mp4" autoplay loop muted></video></div>
</body>
</html>
